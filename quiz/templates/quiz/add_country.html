<!DOCTYPE html>
<html>
<head>
    <title>Добавить страну</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 0 auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        .error { color: red; font-size: 14px; margin-top: 5px; }
        .back { margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>
    <h1>➕ Добавить новую страну</h1>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Название страны:</label>
            <input type="text" name="country" value="{{ request.POST.country }}">
            {% if errors.country %}
                <div class="error">{{ errors.country }}</div>
            {% endif %}
        </div>

        <div class="form-group">
            <label>Название столицы:</label>
            <input type="text" name="capital" value="{{ request.POST.capital }}">
            {% if errors.capital %}
                <div class="error">{{ errors.capital }}</div>
            {% endif %}
        </div>

        <button type="submit">Сохранить</button>
    </form>

    <a href="{% url 'country_list' %}" class="back">← Назад к списку</a>
</body>
</html>
